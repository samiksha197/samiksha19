<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Student Portfolio</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            color: var(--primary-color);
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 30px;
        }

        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* Form Styling */
        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, textarea {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #357abd;
        }

        /* Info Styling */
        .info-section ul {
            list-style: none;
            padding: 0;
        }

        .info-section li {
            margin-bottom: 15px;
        }

        .social-links a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Contact me</h2>
       <div class="grid">
        <section>
            <form action="#" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your Name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="youe email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="How can I help you?" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>

        <section class="info-section">
            <h3>Contact Details</h3>
            <ul>
                <li><strong>📍 Location:</strong> Sangola road,Pandharpur</li>
                <li><strong>📧 Email:</strong> samikshadevmare@email.com</li>
                <li><strong>📞 Phone:</strong> 820-8484-390</li>
            </ul>

            <h3>Connect</h3>
            <div class="social-links">
                <p><a href="#">LinkedIn Profile</a></p>
                <p><a href="#">GitHub Profile</a></p>
            </div>
        </section>
    </div>
</div>

</body>
</html>
