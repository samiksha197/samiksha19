<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Technical Profile</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .profile-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 500px; text-align: center; }
        h2 { color: #333; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        .skill-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .skill-badge { background: #007bff; color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; transition: transform 0.2s; }
        .skill-badge:hover { transform: scale(1.1); background: #0056b3; }
    </style>
</head>
<body>

<div class="profile-card">
    <h2>Technical Profile</h2>
    <p>Aspiring Developer | Student</p>
    <div class="skill-container">
        <div class="skill-badge">HTML</div>
        <div class="skill-badge">C Programming</div>
        <div class="skill-badge">C++</div>
        <div class="skill-badge">Python</div>
        <div class="skill-badge">Java</div>
    </div>
</div>

</body>
</html>
